name: AIYA-CMS Theme Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  submodules: recursive

            - name: Extract theme version from tag
              id: release_version
              run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

            - name: Generate changelog from commits
              id: changelog
              run: |
                  CURRENT_TAG=${GITHUB_REF#refs/tags/}
                  PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -Fxv "$CURRENT_TAG" | head -n1 || true)
                  echo "Current tag: $CURRENT_TAG"
                  echo "Previous tag: $PREVIOUS_TAG"

                  # Only include commits between the previous tag and the current tag.
                  # For the first release, return an empty changelog instead of all history.
                  if [ -z "$PREVIOUS_TAG" ]; then
                      CHANGELOG="- Initial release"
                      echo "No previous tag found, using initial release note"
                  else
                      CHANGELOG=$(git log ${PREVIOUS_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --no-merges)
                      echo "Generating changelog from ${PREVIOUS_TAG} to ${CURRENT_TAG}"
                  fi
                  # GITHUB_OUTPUT
                  echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
                  echo "$CHANGELOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  tools: composer:v2
                  coverage: none

            - name: Install dependencies
              run: |
                  npm ci

            - name: Install plugin runtime dependencies
              working-directory: ./plugins
              run: |
                  composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --no-progress

            - name: Vite Build
              run: npm run build

            - name: Update theme version in style.css file
              run: |
                  sed -i "s/Version: .*/Version: ${{ steps.release_version.outputs.VERSION }}/" style.css

            - name: Prepare theme package staging directory
              run: |
                PACKAGE_ROOT=../release-package
                THEME_DIR_NAME=$(basename "$GITHUB_WORKSPACE")
                THEME_DIR="$PACKAGE_ROOT/$THEME_DIR_NAME"

                rm -rf "$PACKAGE_ROOT"
                mkdir -p "$PACKAGE_ROOT"
                cp -a . "$THEME_DIR"

                find "$THEME_DIR" -name ".DS_Store" -type f -delete
                find "$THEME_DIR" -name ".git" -exec rm -rf {} +
                find "$THEME_DIR" -name ".gitattributes" -type f -delete
                find "$THEME_DIR" -name ".gitignore" -type f -delete
                find "$THEME_DIR" -name ".gitmodules" -type f -delete
                find "$THEME_DIR" -name ".vscode" -type d -prune -exec rm -rf {} +

                rm -rf "$THEME_DIR/.github"
                rm -rf "$THEME_DIR/src"
                rm -rf "$THEME_DIR/node_modules"
                rm -rf "$THEME_DIR/vendor"
                rm -rf "$THEME_DIR/scripts"
                rm -rf "$THEME_DIR/docs"
                rm -rf "$THEME_DIR/plugins/screenshot"
                rm -f "$THEME_DIR/.npmrc"
                rm -f "$THEME_DIR/.gitignore"
                rm -f "$THEME_DIR/.gitmodules"
                rm -f "$THEME_DIR/composer.json"
                rm -f "$THEME_DIR/composer.lock"
                rm -f "$THEME_DIR/.phpcs.xml.dist"
                rm -f "$THEME_DIR/phpstan.neon.dist"
                rm -f "$THEME_DIR/package.json"
                rm -f "$THEME_DIR/package-lock.json"
                rm -f "$THEME_DIR/tsconfig.node.json"
                rm -f "$THEME_DIR/tsconfig.json"
                rm -f "$THEME_DIR/tsconfig.app.json"
                rm -f "$THEME_DIR/components.json"
                rm -f "$THEME_DIR/eslint.config.js"
                rm -f "$THEME_DIR/gulpfile.js"
                rm -f "$THEME_DIR/vite.config.ts"
                rm -f "$THEME_DIR/webpack.config.js"
                rm -f "$THEME_DIR/plugins/plugin-functions.php"

            - name: Archive theme package for ZIP
              run: |
                THEME_DIR_NAME=$(basename "$GITHUB_WORKSPACE")
                npx dir-archiver \
                  --src ../release-package/$THEME_DIR_NAME \
                  --dest ../aiya-cms-theme-${{ steps.release_version.outputs.VERSION }}-release.zip \
                  --includebasedir true \
                  --exclude .DS_Store
                  ls -la ../aiya-cms-theme-${{ steps.release_version.outputs.VERSION }}-release.zip

            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ steps.release_version.outputs.VERSION }}
                  body: |
                      AIYA-CMS Theme for WordPress ${{ steps.release_version.outputs.VERSION }}

                      #### Changes
                      ${{ steps.changelog.outputs.CHANGELOG }}

                      #### Files Included
                      - aiya-cms-theme-${{ steps.release_version.outputs.VERSION }}-release.zip
                  files: |
                      ../aiya-cms-theme-${{ steps.release_version.outputs.VERSION }}-release.zip
                  draft: false
                  prerelease: false

            - name: Release is completed
              run: echo "Done!"
